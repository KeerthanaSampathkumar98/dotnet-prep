<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>.NET Interview Prep — Part 1</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e30;--s4:#252538;
  --c1:#7EFFA0;--c2:#FF7EB3;--c3:#7EB8FF;--c4:#FFD07E;--c5:#C47EFF;
  --t1:#f2f2ff;--t2:#a0a0c0;--t3:#5a5a80;--bd:#2a2a45;
  --danger:#ff6b6b;--warn:#ffd07e;--ok:#7effa0;
}
html,body{height:100%;overflow:hidden;font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:var(--bg);background-image:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(126,255,160,.06),transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(255,126,179,.05),transparent 60%)}
.lchip{display:inline-flex;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--c1);
  border:1px solid rgba(126,255,160,.25);border-radius:20px;padding:4px 14px;margin-bottom:14px;background:rgba(126,255,160,.05)}
.lh{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:8px;text-align:center}
.lh em{color:var(--c1);font-style:normal}
.lsub{color:var(--t2);font-size:13px;margin-bottom:10px;text-align:center}
.lnav{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.lnav a{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 14px;border-radius:20px;
  border:1px solid var(--bd);color:var(--t3);text-decoration:none;transition:.15s}
.lnav a:hover{border-color:var(--c3);color:var(--c3)}
.lnav a.curr{border-color:var(--c1);color:var(--c1);background:rgba(126,255,160,.08)}
.urow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;max-width:720px}
.ucard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 14px;text-align:center;
  cursor:pointer;width:128px;transition:all .2s;position:relative;overflow:hidden}
.ucard:hover{transform:translateY(-3px);border-color:var(--col)}
.ucard.sel{border-color:var(--col);background:color-mix(in srgb,var(--col) 8%,transparent)}
.uav{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin:0 auto 10px;
  border:2px solid var(--col);background:color-mix(in srgb,var(--col) 15%,transparent);color:var(--col)}
.unm{font-size:13px;font-weight:600;margin-bottom:2px}
.url{font-size:11px;color:var(--t3)}
.upb{position:absolute;bottom:0;left:0;height:2px;transition:width .4s;background:var(--col)}
.pinw{display:none;width:100%;max-width:300px;text-align:center}
.pinw.show{display:block}
.pinl{font-size:13px;color:var(--t2);margin-bottom:14px}
.pind{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.pdot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bd);transition:.15s}
.pdot.on{border-color:var(--c1);background:var(--c1)}
.pinp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto}
.pk{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:13px;
  font-size:17px;font-family:'JetBrains Mono',monospace;color:var(--t1);transition:all .12s;cursor:pointer}
.pk:hover{background:var(--s3);border-color:var(--c3)}
.pk:active{transform:scale(.94)}
.pine{color:var(--danger);font-size:12px;margin-top:10px;min-height:16px;font-family:'JetBrains Mono',monospace}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
.topbar{height:52px;min-height:52px;background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:50}
.tlogo{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--c1)}
.tsep{width:1px;height:20px;background:var(--bd)}
.tpart{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c4);letter-spacing:.08em}
.tnav{display:flex;gap:6px;margin-left:8px}
.tnav a{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--bd);color:var(--t3);text-decoration:none;transition:.15s}
.tnav a:hover{border-color:var(--c3);color:var(--c3)}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px}
.tav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.tnm{font-size:13px;font-weight:500}
.outbtn{background:none;border:1px solid var(--bd);border-radius:7px;padding:4px 12px;font-size:12px;color:var(--t3);cursor:pointer;transition:.15s}
.outbtn:hover{border-color:var(--danger);color:var(--danger)}
.ab{display:flex;flex:1;min-height:0;overflow:hidden}

/* SIDEBAR */
.sb{width:230px;min-width:230px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sbsi{padding:10px 10px 0}
.sbsi input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  padding:7px 10px;font-size:12px;font-family:'Instrument Sans',sans-serif;color:var(--t1);outline:none}
.sbsi input:focus{border-color:var(--c1)}
.sbsi input::placeholder{color:var(--t3)}
.sbsc{overflow-y:auto;flex:1;padding:6px 8px 12px}
.sbsec{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;padding:12px 8px 6px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;
  color:var(--t2);transition:all .12s;margin-bottom:1px;font-size:12.5px;border:1px solid transparent}
.ni:hover{background:var(--s2);color:var(--t1)}
.ni.active{background:color-mix(in srgb,var(--col,var(--c1)) 12%,transparent);color:var(--col,var(--c1));border-color:color-mix(in srgb,var(--col,var(--c1)) 25%,transparent)}
.nd{width:6px;height:6px;border-radius:50%;background:var(--bd);flex-shrink:0}
.ni.active .nd,.ni.done .nd{background:var(--col,var(--c1))}
.ns{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--s3);border-radius:20px;padding:1px 7px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* DASHBOARD */
.dh h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:16px 0 24px}
.sbox{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px}
.sv{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:2px}
.sl{font-size:11px;color:var(--t3)}
.sec{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin:20px 0 10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.pt{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .18s}
.pt:hover{border-color:var(--col);transform:translateY(-1px)}
.ptt{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ptd{width:8px;height:8px;border-radius:50%;background:var(--col);flex-shrink:0}
.ptn{font-size:13px;font-weight:500;flex:1}
.ptc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
.pbb{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .5s;background:var(--col)}
.ppc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:5px}

/* TOPIC */
.tban{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:20px 24px;margin-bottom:20px;
  background-image:radial-gradient(ellipse 50% 80% at 90% 50%,color-mix(in srgb,var(--col) 8%,transparent),transparent 60%)}
.btop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.btt{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--col)}
.bts{font-size:13px;color:var(--t2);margin-top:4px}
.bcs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;letter-spacing:.04em}
.cc{border-color:rgba(126,255,160,.3);color:var(--c1);background:rgba(126,255,160,.06)}
.cs{border-color:rgba(255,208,126,.3);color:var(--c4);background:rgba(255,208,126,.06)}
.ca{border-color:rgba(196,126,255,.3);color:var(--c5);background:rgba(196,126,255,.06)}
.stbtn{background:var(--col);color:#000;border:none;border-radius:10px;padding:10px 20px;
  font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.stbtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.clist{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.cx{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.cxh{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:.12s;user-select:none}
.cxh:hover{background:var(--s2)}
.ctag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.cnm{font-size:13px;font-weight:500;flex:1}
.carr{color:var(--t3);font-size:14px;transition:transform .2s;flex-shrink:0}
.carr.open{transform:rotate(90deg)}
.cxb{display:none;padding:0 16px 16px;border-top:1px solid var(--bd)}
.cxb.open{display:block}
.ctx{font-size:13px;line-height:1.8;color:var(--t2);margin-top:12px}
.ctx strong{color:var(--t1);font-weight:600}
.ctx code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--s3);padding:1px 5px;border-radius:4px;color:var(--c3)}
pre.cb{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.75;overflow-x:auto;margin:10px 0;white-space:pre;color:#c9d1d9}
.kw{color:#ff7eb3}.str{color:#ffd07e}.cmt{color:#4b5563}.num{color:#f8a04b}
.dftab{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.dftab th{background:var(--s3);padding:7px 10px;text-align:left;color:var(--t1);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}
.dftab td{padding:7px 10px;border-top:1px solid var(--bd);color:var(--t2);vertical-align:top;font-size:12px}
.dftab tr:hover td{background:var(--s2)}
.bl{list-style:none;margin:6px 0}
.bl li{padding:3px 0 3px 16px;position:relative;color:var(--t2);font-size:13px;line-height:1.7}
.bl li::before{content:'›';position:absolute;left:0;color:var(--col,var(--c1));font-weight:700}

/* TEST */
.tsh{max-width:820px}
.ttop{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ti h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.ti p{font-size:12px;color:var(--t2);margin-top:2px}
.tmr{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:8px 16px;color:var(--c1)}
.tmr.warn{color:var(--warn)}.tmr.danger{color:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.qpr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.qp{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;background:var(--s2);border:1px solid var(--bd);color:var(--t3);transition:.15s}
.qp.cur{background:var(--c1);color:#000;border-color:var(--c1);font-weight:700}
.qp.ans{background:rgba(126,184,255,.15);border-color:var(--c3);color:var(--c3)}
.qp.ok{background:rgba(126,255,160,.15);border-color:var(--c1);color:var(--c1)}
.qp.bad{background:rgba(255,107,107,.15);border-color:var(--danger);color:var(--danger)}
.qcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px;margin-bottom:12px}
.qnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.qdiff{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid}
.qde{border-color:rgba(126,255,160,.3);color:var(--c1)}.qdm{border-color:rgba(255,208,126,.3);color:var(--c4)}.qdh{border-color:rgba(255,126,179,.3);color:var(--c2)}
.qtx{font-size:15px;font-weight:500;line-height:1.65;margin-bottom:16px}
.qco{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;margin-bottom:14px;overflow-x:auto;white-space:pre;color:#c9d1d9}
.opts{display:grid;gap:8px}
.opt{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;cursor:pointer;
  font-size:13px;transition:all .12s;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.opt:hover:not(.locked){border-color:var(--c3);background:rgba(126,184,255,.05)}
.opt.sel{border-color:var(--c3);background:rgba(126,184,255,.08)}
.opt.correct{border-color:var(--c1);background:rgba(126,255,160,.08);color:var(--c1)}
.opt.wrong{border-color:var(--danger);background:rgba(255,107,107,.08);color:var(--danger)}
.ol{font-family:'JetBrains Mono',monospace;font-size:10px;min-width:22px;height:22px;border-radius:5px;
  background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:.12s}
.opt.sel .ol{background:var(--c3);color:#000}
.opt.correct .ol{background:var(--c1);color:#000}
.opt.wrong .ol{background:var(--danger);color:#fff}
.expl{background:rgba(126,255,160,.05);border:1px solid rgba(126,255,160,.2);border-radius:8px;padding:12px 14px;margin-top:10px;font-size:13px;color:var(--c1);line-height:1.65;display:none}
.expl.show{display:block}
.tnav{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px}
.btn{border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;font-family:'Instrument Sans',sans-serif;border:1px solid var(--bd);background:var(--s2);color:var(--t1);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--s3)}
.btnp{background:var(--c1);color:#000;border-color:var(--c1);font-weight:700}
.btnp:hover{filter:brightness(1.08)}
.btnw{border-color:var(--warn);color:var(--warn)}
/* RESULTS */
.rh{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:28px;text-align:center;margin-bottom:16px}
.rsc{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;letter-spacing:-.04em;margin-bottom:4px}
.rlb{font-size:13px;color:var(--t2);margin-bottom:14px}
.rgr{display:inline-block;padding:6px 20px;border-radius:20px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:6px;border:1px solid}
.gra{border-color:rgba(126,255,160,.4);color:var(--c1);background:rgba(126,255,160,.08)}
.grb{border-color:rgba(255,208,126,.4);color:var(--c4);background:rgba(255,208,126,.08)}
.grc{border-color:rgba(255,107,107,.4);color:var(--danger);background:rgba(255,107,107,.08)}
.rst{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.rs{background:var(--s2);border-radius:10px;padding:12px;font-size:11px;color:var(--t3)}
.rs strong{display:block;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--t1);margin-bottom:1px}
.ri{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:8px}
.riq{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:10px}
.ria{font-size:12.5px;padding:7px 10px;border-radius:8px;margin-bottom:4px}
.rok{background:rgba(126,255,160,.07);color:var(--c1)}
.rbd{background:rgba(255,107,107,.07);color:var(--danger)}
.rex{font-size:12px;color:var(--t3);margin-top:6px;line-height:1.65}
/* HISTORY */
.hr2{background:var(--s1);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;flex-wrap:wrap}
.ht{font-size:13px;font-weight:500;flex:1;min-width:140px}
.hd{font-size:11px;color:var(--t3)}
.hsc{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
</style>
</head>

<div id="login">
  <div class="lchip">⬡ .NET Interview Prep — Part 1 of 3</div>
  <div class="lh">C# · Collections · <em>MVC</em></div>

<script>
const USERS=[
  {id:'u1',name:'Keerthana',role:'Senior Dev·TCS',pin:'1234',col:'#7EFFA0',init:'KS'},
  {id:'u2',name:'Naveen',role:'Developer',pin:'2345',col:'#FF7EB3',init:'NV'},
  {id:'u3',name:'Priya',role:'Developer',pin:'3456',col:'#7EB8FF',init:'PR'},
  {id:'u4',name:'Arun',role:'Developer',pin:'4567',col:'#FFD07E',init:'AR'},
  {id:'u5',name:'Deepa',role:'Developer',pin:'5678',col:'#C47EFF',init:'DP'}
];

const TOPICS=[
{id:'csharp',name:'C# OOP & Basics',col:'#7EFFA0',
concepts:[
{name:'Data Types, var, dynamic, Nullable',tag:'core',
txt:`<strong>Value Types</strong> (stack): <code>int</code>, <code>float</code>, <code>double</code>, <code>decimal</code>, <code>bool</code>, <code>char</code>, <code>struct</code>, <code>enum</code>.<br>
<strong>Reference Types</strong> (heap): <code>string</code>, <code>class</code>, <code>array</code>, <code>interface</code>, <code>delegate</code>.<br>
<strong>var</strong> = compile-time inference. <strong>dynamic</strong> = runtime type. <strong>object</strong> = base of all.<br>
<strong>Nullable</strong>: <code>int?</code> = <code>Nullable&lt;int&gt;</code>. Use <code>??</code> null-coalescing, <code>??=</code> null-assign, <code>?.</code> null-conditional.`,
code:`double d = 9.7;  int i = (int)d;      // explicit cast → 9 (truncates)
var name = "Keerthana";              // string inferred at compile time
dynamic obj = "hello"; obj = 42;    // runtime type switch — no error
int? age = null;
int val = age ?? 18;                 // null-coalescing → 18
age ??= 25;                          // assign only if null
if (obj is string s) Console.WriteLine(s.ToUpper()); // pattern matching`},
{name:'OOP: Encapsulation & Access Modifiers',tag:'core',
txt:`<strong>Encapsulation</strong>: hide state with <code>private</code> fields, expose via <code>public</code> properties.<br>
<strong>public</strong> — everywhere &nbsp;|&nbsp; <strong>private</strong> — class only (default for members)<br>
<strong>protected</strong> — class + subclasses &nbsp;|&nbsp; <strong>internal</strong> — same assembly<br>
<strong>protected internal</strong> — same assembly OR any derived class`,
code:`public class BankAccount {
    private decimal _balance;
    public decimal Balance {
        get => _balance;
        private set => _balance = value >= 0 ? value : 0;
    }
    public bool Withdraw(decimal amount) {
        if (amount > _balance) return false;
        _balance -= amount; return true;
    }
}`},
{name:'Inheritance & Polymorphism',tag:'core',
txt:`<strong>Compile-time polymorphism</strong>: method overloading (same name, different params).<br>
<strong>Runtime polymorphism</strong>: <code>virtual</code> + <code>override</code> — dynamic dispatch.<br>
<strong>Method hiding</strong>: <code>new</code> keyword — parent reference calls parent method (breaks polymorphism).<br>
<strong>sealed override</strong>: prevents further overriding down the hierarchy.`,
code:`public class Animal { public virtual void Speak() => Console.WriteLine("..."); }
public class Dog : Animal {
    public override void Speak() => Console.WriteLine("Woof!");
}
Animal a = new Dog();
a.Speak(); // "Woof!" — runtime polymorphism (dynamic dispatch)

// Method Overloading (compile-time)
public int Add(int a, int b) => a + b;
public double Add(double a, double b) => a + b;
public int Add(int a, int b, int c) => a + b + c;`},
{name:'Abstract Class vs Interface',tag:'core',
txt:`<table class="dftab"><tr><th>Aspect</th><th>Abstract Class</th><th>Interface</th></tr>
<tr><td>Instantiation</td><td>No</td><td>No</td></tr>
<tr><td>Implementation</td><td>Can have code</td><td>Contract only (C#8+ default impl)</td></tr>
<tr><td>Fields/State</td><td>Yes</td><td>No (properties only)</td></tr>
<tr><td>Constructor</td><td>Yes</td><td>No</td></tr>
<tr><td>Inheritance</td><td>One only</td><td>Multiple allowed</td></tr>
</table>
<strong>Rule:</strong> Abstract = IS-A (shared behaviour). Interface = CAN-DO (contract).`,
code:`public abstract class Shape {
    public string Color { get; set; }
    public abstract double Area();
    public virtual string Describe() => $"Area: {Area():F2}";
}
public interface IDrawable { void Draw(); void Resize(double f); }
public class Circle : Shape, IDrawable {
    public double Radius { get; set; }
    public override double Area() => Math.PI * Radius * Radius;
    public void Draw() => Console.WriteLine("Drawing circle");
    public void Resize(double f) => Radius *= f;
}`},
{name:'Sealed, Static & Partial Classes',tag:'core',
txt:`<strong>Sealed</strong>: cannot be inherited. <code>string</code> is sealed.<br>
<strong>Static</strong>: cannot be instantiated. All members must be static. Utility classes.<br>
<strong>Partial</strong>: split across multiple files. WinForms, EF auto-generated code.<br>
<strong>Static constructor</strong>: runs ONCE before first use. No parameters. No access modifier.<br>
<strong>Private constructor</strong>: prevents external instantiation. Core of Singleton pattern.`,
code:`public sealed class Config { /* cannot be inherited */ }
public static class MathHelper {
    public static double CircleArea(double r) => Math.PI * r * r;
}
// Singleton with private constructor + Lazy<T>
public sealed class AppCache {
    private static readonly Lazy<AppCache> _i = new(() => new AppCache());
    private AppCache() { }
    public static AppCache Instance => _i.Value;
}
// Partial class — split across files
public partial class Customer { public string Name { get; set; } }
public partial class Customer { public string Email { get; set; } }`},
{name:'Memory: Stack, Heap, Boxing, GC, IDisposable',tag:'senior',
txt:`<strong>Stack</strong>: fast LIFO, value types + method frames. Auto-released on return.<br>
<strong>Heap</strong>: dynamic allocation for reference types. Managed by GC (Gen0→Gen1→Gen2).<br>
<strong>Boxing</strong>: value type → object (heap allocation). <strong>Unboxing</strong>: object → value type. EXPENSIVE!<br>
<strong>IDisposable</strong>: release unmanaged resources. ALWAYS use <code>using</code> statement.<br>
<strong>Finalizer (~ClassName)</strong>: GC fallback. Non-deterministic. Always prefer Dispose().`,
code:`// Boxing — avoid in loops, use generics
ArrayList al = new(); al.Add(42);    // boxes int ❌ heap allocation
List<int> li = new(); li.Add(42);    // no boxing ✅

// Dispose pattern
public class FileHelper : IDisposable {
    private FileStream _fs; private bool _disposed;
    public FileHelper(string p) => _fs = File.Open(p, FileMode.Open);
    protected virtual void Dispose(bool d) {
        if (!_disposed) { if(d) _fs?.Dispose(); _disposed = true; }
    }
    public void Dispose() { Dispose(true); GC.SuppressFinalize(this); }
    ~FileHelper() => Dispose(false);
}
using var fh = new FileHelper("data.txt"); // auto-disposed ✅`},
{name:'Exception Handling & Custom Exceptions',tag:'core',
txt:`<strong>finally</strong>: ALWAYS runs — even if exception thrown or return hit. Use for cleanup.<br>
<strong>throw vs throw ex</strong>: <code>throw</code> preserves stack trace. <code>throw ex</code> RESETS it — lose root cause!<br>
<strong>Multiple catch</strong>: catch SPECIFIC exceptions first, general <code>Exception</code> LAST.`,
code:`// CRITICAL: throw vs throw ex
catch (Exception ex) { _log.Error(ex); throw;    } // ✅ preserves stack trace
catch (Exception ex) { _log.Error(ex); throw ex; } // ❌ RESETS stack trace

public class InsufficientFundsException : Exception {
    public decimal Requested { get; }
    public InsufficientFundsException(decimal req, decimal avail)
        : base($"Cannot withdraw {req:C}. Available: {avail:C}") { Requested = req; }
}
try { ProcessPayment(); }
catch (InsufficientFundsException ex) { /* handle */ }
catch (TimeoutException) { /* retry */ }
catch (Exception ex) { _log.Error(ex); throw; }
finally { CloseConnection(); } // always runs`},
{name:'String vs StringBuilder',tag:'core',
txt:`<strong>String</strong>: IMMUTABLE. Every <code>+=</code> creates a new object on heap. Fine for a few concatenations.<br>
<strong>StringBuilder</strong>: MUTABLE buffer. Use for loops/repeated modifications. Single allocation.<br>
<strong>Key methods</strong>: Trim(), ToUpper(), Contains(), Split(), Replace(), IsNullOrWhiteSpace().`,
code:`// String immutability — avoid in loops
string s = "";
for(int i=0; i<1000; i++) s += i;      // ❌ 1000 new string objects!
var sb = new StringBuilder();
for(int i=0; i<1000; i++) sb.Append(i); // ✅ single buffer
string result = sb.ToString();

// String methods
"  hello  ".Trim()                   // "hello"
string.IsNullOrWhiteSpace(s)         // null-safe empty check
$"Name: {name}, Age: {age}"          // interpolation`}
],
tests:[
{q:'What prints?\nint x=5; object o=x; x=10; Console.WriteLine(o);',opts:['10','5','0','Error'],ans:1,diff:'easy',exp:'Boxing copies the VALUE at that moment. o holds boxed 5. Changing x to 10 has no effect on the already-boxed value.'},
{q:'Which access modifier: same assembly OR any derived class?',opts:['internal','private','protected','protected internal'],ans:3,diff:'medium',exp:'"protected internal" is the UNION of protected and internal — accessible from the same assembly (internal) OR from any derived class in any assembly (protected).'},
{q:'Which block in try-catch-finally ALWAYS runs?',opts:['try','catch','finally','All'],ans:2,diff:'easy',exp:'finally always executes regardless of exception or return statement. Use it for cleanup like closing DB connections.'},
{q:'"throw ex" vs "throw" — what does throw ex lose?',opts:['Exception message','Stack trace','InnerException','Exception type'],ans:1,diff:'medium',exp:'"throw ex" resets the stack trace to the current catch block — original line of failure is lost. Always use bare "throw" to rethrow.'},
{q:'Which class type CANNOT be inherited?',opts:['Abstract','Partial','Sealed','Internal'],ans:2,diff:'easy',exp:'Sealed class prevents inheritance. String in .NET is sealed for security and performance.'},
{q:'int? x = null; int y = x ?? 5; What is y?',opts:['0','null','5','Compile error'],ans:2,diff:'easy',exp:'?? returns the right-hand value when the left is null. Since x is null, y = 5.'},
{q:'StringBuilder preferred over string+= in loops because:',opts:['Value type','String immutable — each += creates new object','Uses generics','Allows loops'],ans:1,diff:'easy',exp:'String is immutable. Each += creates a new string object, causing O(n²) allocations. StringBuilder uses a resizable buffer — O(n) total.'},
{q:'GC generations: which is collected MOST frequently?',opts:['Gen2','Gen1','Gen0','All same'],ans:2,diff:'medium',exp:'Gen0 holds short-lived objects and is collected most often. Surviving objects promote to Gen1, then Gen2 for long-lived objects.'},
{q:'Private constructor is used in which pattern?',opts:['Factory','Observer','Singleton','Repository'],ans:2,diff:'medium',exp:'Singleton uses a private constructor to prevent external instantiation — only one instance accessible via a static property.'},
{q:'var keyword at runtime is:',opts:['dynamic','object','The inferred compile-time type','Variant'],ans:2,diff:'easy',exp:'var is compile-time inference. After compilation, var x = 5 is exactly int x = 5. No "var" type exists at runtime.'},
{q:'Method overloading vs overriding: key difference?',opts:['Same thing','Overloading=same name/diff params; Overriding=virtual+override polymorphism','Overriding is compile-time','Only overriding uses inheritance'],ans:1,diff:'medium',exp:'Overloading = compile-time polymorphism (same name, different signatures). Overriding = runtime polymorphism (virtual base replaced by derived using override).'},
{q:'IDisposable.Dispose() vs finalizer: preferred cleanup?',opts:['Finalizer — reliable','Dispose() with using — deterministic','Both equal','Neither'],ans:1,diff:'medium',exp:'Dispose() with using is deterministic — runs immediately when block ends. Finalizer runs non-deterministically whenever GC decides. Always prefer Dispose().'}
]},

{id:'collections',name:'Collections & LINQ',col:'#7EB8FF',
concepts:[
{name:'Core Collections',tag:'core',
txt:`<table class="dftab"><tr><th>Collection</th><th>Key Feature</th><th>Lookup</th><th>Use When</th></tr>
<tr><td>Array</td><td>Fixed size, fastest index</td><td>O(1)</td><td>Size known upfront</td></tr>
<tr><td>List&lt;T&gt;</td><td>Dynamic, typed, ordered</td><td>O(n)</td><td>Default ordered list</td></tr>
<tr><td>Dictionary&lt;K,V&gt;</td><td>Hash table key-value</td><td>O(1)</td><td>Fast key-based access</td></tr>
<tr><td>HashSet&lt;T&gt;</td><td>Unique items, hash-based</td><td>O(1)</td><td>Deduplication, set ops</td></tr>
<tr><td>Queue&lt;T&gt;</td><td>FIFO</td><td>O(1)</td><td>Task queues, BFS</td></tr>
<tr><td>Stack&lt;T&gt;</td><td>LIFO</td><td>O(1)</td><td>Undo, DFS, parsing</td></tr>
<tr><td>SortedList&lt;K,V&gt;</td><td>Sorted by key</td><td>O(log n)</td><td>Ordered key-value pairs</td></tr>
</table>
<strong>ArrayList vs List&lt;T&gt;</strong>: ArrayList boxes value types (slow). ALWAYS use <code>List&lt;T&gt;</code>.`,
code:`var list = new List<int> { 1, 2, 3 };
list.Add(4); list.Remove(2); list.Sort();
var dict = new Dictionary<string, int>();
dict["a"] = 1;
if (dict.TryGetValue("b", out int v)) Console.WriteLine(v);
var set = new HashSet<int> { 1, 2, 2, 3 }; // {1,2,3}
set.UnionWith(new[] { 4, 5 }); set.IntersectWith(new[] { 2, 3, 4 });
var q = new Queue<string>(); q.Enqueue("first"); q.Enqueue("second");
string next = q.Dequeue(); // "first" FIFO
var stk = new Stack<int>(); stk.Push(1); stk.Push(2);
int top = stk.Pop(); // 2 LIFO`},
{name:'Generics & IEnumerable vs IQueryable',tag:'core',
txt:`<strong>Generics</strong>: type-safe, no boxing. Constraints restrict what T can be.<br>
<strong>IEnumerable&lt;T&gt;</strong>: in-memory LINQ. Executes ALL data in C# then filters.<br>
<strong>IQueryable&lt;T&gt;</strong>: builds SQL expression tree → WHERE sent to database. Does NOT pull all rows first!`,
code:`// Generic method with constraint
public T Max<T>(T a, T b) where T : IComparable<T>
    => a.CompareTo(b) >= 0 ? a : b;
// Constraints: class | struct | new() | IFoo | BaseClass

// IEnumerable — in-memory LINQ to Objects ❌ for large DB tables
IEnumerable<User> e = ctx.Users.Where(u => u.IsActive); // fetches ALL rows

// IQueryable — translates to SQL ✅
IQueryable<User> q = ctx.Users.Where(u => u.IsActive);
// Generates: SELECT * FROM Users WHERE IsActive = 1`},
{name:'LINQ — All Operators',tag:'core',
txt:`<strong>Deferred execution</strong>: Where, Select, OrderBy, Skip, Take — NOT executed until iterated.<br>
<strong>Immediate execution</strong>: ToList(), ToArray(), Count(), First(), Sum() — forces execution.<br>
<strong>FirstOrDefault</strong>: returns first match or null. <strong>SingleOrDefault</strong>: THROWS if more than one match!`,
code:`var res = emp.Where(e => e.IsActive)
             .Select(e => new { e.Name, e.Salary })
             .OrderByDescending(e => e.Salary)
             .Skip((page-1)*size).Take(size).ToList();

var byDept = emp.GroupBy(e => e.DeptId)
    .Select(g => new { Dept=g.Key, Count=g.Count(), Avg=g.Average(e=>e.Salary) });

var j = emp.Join(depts, e=>e.DeptId, d=>d.Id,
    (e,d) => new { e.Name, d.DeptName });

bool has = emp.Any(e => e.Role == "Manager");
bool all = emp.All(e => e.IsActive);
var uDepts = emp.Select(e => e.DeptId).Distinct();

// Deferred execution demo
var q = emp.Where(e => e.IsActive);         // NOT executed
emp.Add(new Employee { IsActive=true });    // will be included!
var list = q.ToList();                      // executes NOW`},
{name:'Delegates, Func, Action, Events, Lambda',tag:'senior',
txt:`<strong>Delegate</strong>: type-safe function pointer. <strong>Multicast</strong>: holds multiple methods.<br>
<strong>Func&lt;T,TResult&gt;</strong>: returns value. <strong>Action&lt;T&gt;</strong>: void. <strong>Predicate&lt;T&gt;</strong>: bool.<br>
<strong>Event</strong>: wraps delegate. Outsiders can only subscribe/unsubscribe — cannot invoke directly.`,
code:`Func<int,int,int> add = (a,b) => a+b;
Action<string> log = Console.WriteLine;
Predicate<int> isPos = n => n > 0;

// Multicast delegate
Action<string> handlers = Console.WriteLine;
handlers += msg => File.AppendAllText("log.txt", msg);
handlers("Hello"); // calls BOTH

public class Button {
    public event EventHandler<string> Clicked;
    public void Click() => Clicked?.Invoke(this, "btn1"); // thread-safe null check
}
btn.Clicked += (s,e) => Console.WriteLine(e); // subscribe`},
{name:'async / await, Task, Threading',tag:'senior',
txt:`<strong>async/await</strong>: non-blocking I/O. Compiler generates state machine.<br>
<strong>Task.WhenAll</strong>: concurrent tasks (faster). <strong>Task.WhenAny</strong>: first to complete.<br>
<strong>NEVER</strong> use <code>.Result</code> or <code>.Wait()</code> in ASP.NET — deadlock risk!<br>
<strong>async void</strong>: exceptions unobservable, crashes app. ONLY for event handlers!`,
code:`// Sequential (3s) vs Concurrent (1s)
// Sequential:
var u = await GetUserAsync(id);   // wait 1s
var o = await GetOrdersAsync(id); // wait 1s
// Concurrent:
var ut = GetUserAsync(id); var ot = GetOrdersAsync(id); // both start
await Task.WhenAll(ut, ot);                              // total: 1s ✅
var user = await ut; var orders = await ot;

// CancellationToken
public async Task ProcessAsync(CancellationToken ct) {
    for(int i=0; i<1000; i++) {
        ct.ThrowIfCancellationRequested(); // cooperative cancel
        await DoWorkAsync(i, ct);
    }
}`}
],
tests:[
{q:'Dictionary<K,V>.TryGetValue() time complexity?',opts:['O(n)','O(log n)','O(1) average','O(n²)'],ans:2,diff:'easy',exp:'Dictionary uses a hash table. Average-case lookup is O(1) — hashes the key and jumps directly to the bucket.'},
{q:'IEnumerable vs IQueryable: which translates LINQ to SQL?',opts:['IEnumerable','IQueryable','Both','Neither'],ans:1,diff:'medium',exp:'IQueryable builds an expression tree that EF Core translates to SQL. IEnumerable fetches ALL rows from DB first, then filters in C# — very slow for large tables.'},
{q:'var q = list.Where(x=>x>5); list.Add(10); var r = q.ToList(); Is 10 in r?',opts:['No — query fixed','Yes — deferred execution','Compile error','Depends on type'],ans:1,diff:'medium',exp:'Deferred execution: Where is not run at definition. When ToList() is called, 10 is already in the list and 10>5, so it is included.'},
{q:'SingleOrDefault throws when:',opts:['No match','More than one match','List is null','Type mismatch'],ans:1,diff:'medium',exp:'SingleOrDefault throws InvalidOperationException if more than one element matches. Use FirstOrDefault if you only want the first match.'},
{q:'HashSet<int> h = new(){1,2,2,3}; h.Count = ?',opts:['4','3','2','Error'],ans:1,diff:'easy',exp:'HashSet stores only unique elements. Duplicate 2 is ignored. Result: {1,2,3} → Count = 3.'},
{q:'Task.WhenAll awaits:',opts:['First task','All tasks concurrently','Sequential tasks','Cancelled tasks'],ans:1,diff:'easy',exp:'Task.WhenAll awaits ALL provided tasks, completing when the LAST one finishes. Runs all concurrently — much faster than sequential await.'},
{q:'Why avoid async void (except event handlers)?',opts:['Slower','Exceptions unobservable — can crash app','Blocks thread','Memory leak'],ans:1,diff:'hard',exp:'Exceptions from async void cannot be caught by callers and propagate on the sync context, potentially crashing the application. Always return Task.'},
{q:'Func<int, string, bool> — return type?',opts:['int','string','bool','void'],ans:2,diff:'medium',exp:'In Func<T1,T2,...,TResult>, the LAST type parameter is the return type. Func<int,string,bool> takes int and string, returns bool.'},
{q:'Best collection for fast unique-element lookup?',opts:['List<T>','Array','HashSet<T>','SortedList'],ans:2,diff:'easy',exp:'HashSet<T> provides O(1) Contains() using hashing and stores only unique elements.'},
{q:'CancellationToken.ThrowIfCancellationRequested() does what?',opts:['Silently stops','Throws OperationCanceledException if cancelled','Returns false','Logs warning'],ans:1,diff:'medium',exp:'ThrowIfCancellationRequested throws OperationCanceledException if the token has been cancelled, enabling cooperative cancellation in long-running loops.'}
]},

{id:'mvccore',name:'ASP.NET MVC & Core',col:'#FF7EB3',
concepts:[
{name:'MVC Architecture & Request Lifecycle',tag:'core',
txt:`<strong>Model</strong>: data + business logic. <strong>View</strong>: UI (Razor). <strong>Controller</strong>: handles HTTP requests.<br>
<strong>Request lifecycle</strong>: Routing → DI instantiates Controller → Auth Filters → Action Filters → Action Method → Result.<br>
<strong>IActionResult</strong>: Ok(), BadRequest(), NotFound(), Created(), NoContent(), Redirect().`,
code:`[Authorize]
public class OrdersController : Controller {
    private readonly IOrderService _svc;
    public OrdersController(IOrderService svc) => _svc = svc; // DI
    public async Task<IActionResult> Index() => View(await _svc.GetAllAsync());
    [HttpPost, ValidateAntiForgeryToken]
    public async Task<IActionResult> Create(OrderViewModel vm) {
        if (!ModelState.IsValid) return View(vm);
        await _svc.CreateAsync(vm);
        TempData["msg"] = "Created!";
        return RedirectToAction(nameof(Index)); // PRG pattern
    }
}`},
{name:'Routing: Conventional & Attribute',tag:'core',
txt:`<strong>Conventional routing</strong>: global template in Program.cs. Good for MVC apps.<br>
<strong>Attribute routing</strong>: [Route], [HttpGet] on controller/action. More explicit. Recommended for APIs.`,
code:`// Conventional
app.MapControllerRoute("default", "{controller=Home}/{action=Index}/{id?}");
// /Products/Details/5 → ProductsController.Details(5)

// Attribute routing (Web API)
[ApiController, Route("api/[controller]")]
public class OrdersController : ControllerBase {
    [HttpGet]                    // GET api/orders
    [HttpGet("{id:int}")]         // GET api/orders/5
    [HttpPost]                   // POST api/orders
    [HttpPut("{id:int}")]         // PUT api/orders/5
    [HttpPatch("{id:int}")]       // PATCH api/orders/5
    [HttpDelete("{id:int}")]      // DELETE api/orders/5
}`},
{name:'State Management: ViewBag, TempData, Session, Cookie',tag:'core',
txt:`<table class="dftab"><tr><th>Mechanism</th><th>Scope</th><th>Type-safe</th><th>Best Use</th></tr>
<tr><td>ViewData</td><td>Current request</td><td>No (object)</td><td>Controller → View</td></tr>
<tr><td>ViewBag</td><td>Current request</td><td>No (dynamic)</td><td>Controller → View</td></tr>
<tr><td>TempData</td><td>Survives 1 redirect</td><td>No</td><td>PRG success/error messages</td></tr>
<tr><td>Session</td><td>Browser session</td><td>No</td><td>User login state</td></tr>
<tr><td>Cookie</td><td>Browser-stored</td><td>No</td><td>Preferences, remember me</td></tr>
</table>
<strong>PRG Pattern</strong>: Post → Redirect → Get. Prevents form re-submission on F5.`,
code:`ViewBag.Title = "Orders"; ViewData["Count"] = 42;
TempData["Success"] = "Order created!";
return RedirectToAction("Index");
HttpContext.Session.SetString("UserId", user.Id.ToString());
var uid = HttpContext.Session.GetString("UserId");
var opts = new CookieOptions { HttpOnly=true, Secure=true, Expires=DateTimeOffset.UtcNow.AddDays(30) };
Response.Cookies.Append("theme", "dark", opts);`},
{name:'Filters: Action, Authorization, Exception',tag:'senior',
txt:`<strong>Execution order</strong>: Authorization → Action (OnExecuting) → Action → Action (OnExecuted) → Result → Exception (if error).<br>
<strong>Authorization filter</strong>: runs FIRST, short-circuits on failure.<br>
<strong>Action filter</strong>: IActionFilter — OnActionExecuting/OnActionExecuted.<br>
<strong>Exception filter</strong>: IExceptionFilter — handles unhandled exceptions from actions.`,
code:`public class LogFilter : IActionFilter {
    public void OnActionExecuting(ActionExecutingContext ctx) =>
        Console.WriteLine($"Executing: {ctx.ActionDescriptor.DisplayName}");
    public void OnActionExecuted(ActionExecutedContext ctx) =>
        Console.WriteLine(ctx.Exception != null ? "Error!" : "Success");
}
public class GlobalExFilter : IExceptionFilter {
    public void OnException(ExceptionContext ctx) {
        ctx.Result = new ObjectResult(new { error = ctx.Exception.Message }) { StatusCode=500 };
        ctx.ExceptionHandled = true;
    }
}
builder.Services.AddControllers(o => {
    o.Filters.Add<LogFilter>();
    o.Filters.Add<GlobalExFilter>();
});`},
{name:'ASP.NET Core Middleware & DI Lifetimes',tag:'core',
txt:`<strong>Middleware order CRITICAL</strong>: ExceptionHandler → HTTPS → Static → Routing → Authentication → Authorization → Endpoints.<br>
<strong>Singleton</strong>: one for app lifetime — config, cache. <strong>Scoped</strong>: one per HTTP request — DbContext.<br>
<strong>Transient</strong>: new every injection — stateless services.<br>
<strong>NEVER</strong> inject Scoped into Singleton — captive dependency bug (stale data)!`,
code:`app.UseExceptionHandler("/error");
app.UseHttpsRedirection();
app.UseRouting();
app.UseAuthentication();  // who are you?
app.UseAuthorization();   // what can you do?
app.MapControllers();

builder.Services.AddSingleton<IAppConfig, AppConfig>();
builder.Services.AddScoped<IOrderRepo, EfOrderRepo>();
builder.Services.AddTransient<IEmailSvc, SmtpEmailSvc>();`},
{name:'JWT Authentication',tag:'senior',
txt:`JWT = <code>Header.Payload.Signature</code> (Base64). Server signs with secret key.<br>
<strong>Flow</strong>: Login → server creates JWT → client sends in <code>Authorization: Bearer &lt;token&gt;</code>.<br>
<strong>Stateless</strong>: no DB lookup per request. Cannot revoke until expiry — use short expiry + refresh tokens.`,
code:`builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)
    .AddJwtBearer(o => { o.TokenValidationParameters = new() {
        ValidateIssuerSigningKey = true,
        IssuerSigningKey = new SymmetricSecurityKey(Encoding.UTF8.GetBytes(secret)),
        ValidateIssuer = true, ValidIssuer = config["Jwt:Issuer"],
        ValidateLifetime = true, ClockSkew = TimeSpan.Zero
    }; });
[Authorize]                         // any authenticated user
[Authorize(Roles = "Admin")]        // role-based
[Authorize(Policy = "CanEdit")]     // policy-based`},
{name:'Web API: HTTP Methods, Status Codes & Validation',tag:'core',
txt:`<table class="dftab"><tr><th>Method</th><th>Purpose</th><th>Idempotent</th></tr>
<tr><td>GET</td><td>Read resource</td><td>Yes</td></tr>
<tr><td>POST</td><td>Create resource</td><td>NO</td></tr>
<tr><td>PUT</td><td>Replace resource</td><td>Yes</td></tr>
<tr><td>PATCH</td><td>Partial update</td><td>No</td></tr>
<tr><td>DELETE</td><td>Delete resource</td><td>Yes</td></tr>
</table>
<strong>200</strong> OK | <strong>201</strong> Created | <strong>204</strong> No Content | <strong>400</strong> Bad Request | <strong>401</strong> Unauthorized | <strong>403</strong> Forbidden | <strong>404</strong> Not Found | <strong>500</strong> Server Error<br>
<strong>401</strong> = not authenticated. <strong>403</strong> = authenticated but no permission (different!).`,
code:`[ApiController, Route("api/v1/[controller]")]
public class OrdersController : ControllerBase {
    [HttpGet("{id:int}")]
    public async Task<IActionResult> Get(int id) {
        var o = await _svc.GetByIdAsync(id);
        return o is null ? NotFound() : Ok(o);
    }
    [HttpPost]
    public async Task<IActionResult> Create([FromBody] CreateOrderDto dto) {
        var created = await _svc.CreateAsync(dto);
        return CreatedAtAction(nameof(Get), new { id=created.Id }, created); // 201
    }
}`}
],
tests:[
{q:'Which state mechanism survives exactly ONE redirect?',opts:['ViewBag','Session','TempData','Cookie'],ans:2,diff:'easy',exp:'TempData persists for exactly one redirect, used in the PRG (Post-Redirect-Get) pattern to carry success/error messages.'},
{q:'Filter execution order — which runs FIRST?',opts:['Action filter','Result filter','Authorization filter','Exception filter'],ans:2,diff:'medium',exp:'Authorization filter runs first and short-circuits the pipeline on failure. No other filters or action method run if auth fails.'},
{q:'[ValidateAntiForgeryToken] prevents:',opts:['SQL injection','XSS','CSRF','JWT spoofing'],ans:2,diff:'medium',exp:'CSRF (Cross-Site Request Forgery) tricks users into submitting requests. Anti-forgery token validates the request came from your own form.'},
{q:'[ApiController] enables automatically:',opts:['JWT auth','Swagger','400 on invalid ModelState','Logging'],ans:2,diff:'medium',exp:'[ApiController] enables automatic model state validation (400 if invalid), binding source inference, and ProblemDetails error responses.'},
{q:'Middleware order: which must come before UseAuthorization?',opts:['UseStaticFiles','UseHttpsRedirection','UseAuthentication','UseRouting'],ans:2,diff:'easy',exp:'UseAuthentication must come before UseAuthorization. Authentication establishes WHO you are. Authorization then decides WHAT you can do.'},
{q:'DI Scoped lifetime: one instance per ___',opts:['App lifetime','HTTP request','Method call','Class instantiation'],ans:1,diff:'easy',exp:'Scoped creates one instance per HTTP request. All services within the same request share the same Scoped instance. DbContext is always Scoped.'},
{q:'JWT: 401 vs 403 difference?',opts:['Same','401=not authenticated; 403=no permission','401=server error','401=bad request'],ans:1,diff:'medium',exp:'401 = not authenticated (not logged in or invalid token). 403 = authenticated but lacks permission for that resource.'},
{q:'REST: which HTTP method is NOT idempotent?',opts:['GET','PUT','DELETE','POST'],ans:3,diff:'easy',exp:'POST is not idempotent — calling it twice creates two resources. GET, PUT, DELETE are idempotent: repeated calls produce the same server state.'},
{q:'CreatedAtAction() returns which status code?',opts:['200 OK','201 Created','204 No Content','301 Redirect'],ans:1,diff:'easy',exp:'CreatedAtAction returns 201 Created with a Location header pointing to the new resource. Standard REST convention for POST.'},
{q:'Captive dependency bug occurs when:',opts:['Singleton captures Transient only','Singleton captures Scoped (stale data)','Scoped captures Singleton','Transient captures Transient'],ans:1,diff:'hard',exp:'Injecting a Scoped service into Singleton causes the Scoped instance to be captured for the Singleton\'s entire lifetime — it never gets refreshed per-request, causing stale data bugs.'},
{q:'PATCH vs PUT difference:',opts:['No difference','PATCH partial update; PUT full replacement','PUT partial; PATCH full','PATCH is not REST'],ans:1,diff:'medium',exp:'PUT replaces the entire resource. PATCH applies a partial update — only the fields in the request body are changed.'},
{q:'Conventional routing: {controller=Home}/{action=Index}/{id?} — what does ? mean on id?',opts:['Required','Optional — if absent, action still matches','Default value only','Integer only'],ans:1,diff:'easy',exp:'The ? makes the route segment optional. If id is absent from the URL, the action still matches and id will be null or its default value.'}
]}
];

// ─── STATE ───
let CU=null,CP='dash',CT=null,TS=null,pinBuf='',selUid=null,tmrInt=null;
const sk=(u,k)=>`p1_${u}_${k}`;
const sg=(u,k,d)=>{try{const v=sessionStorage.getItem(sk(u,k));return v?JSON.parse(v):d}catch{return d}};
const ss=(u,k,v)=>{try{sessionStorage.setItem(sk(u,k),JSON.stringify(v))}catch{}};
const gP=u=>sg(u,'p',{});
const sP=(u,p)=>ss(u,'p',p);
const gH=u=>sg(u,'h',[]);
const aH=(u,r)=>{const h=gH(u);h.unshift(r);if(h.length>50)h.pop();ss(u,'h',h)};

// ─── LOGIN ───
function initLogin(){
  document.getElementById('urow').innerHTML=USERS.map(u=>{
    const p=gP(u.id),done=Object.values(p).filter(x=>x.a>0).length,pct=Math.round(done/TOPICS.length*100);
    return`<div class="ucard" id="uc-${u.id}" onclick="pickU('${u.id}')" style="--col:${u.col}">
      <div class="uav">${u.init}</div><div class="unm">${u.name}</div>
      <div class="url">${u.role}</div><div class="upb" style="width:${pct}%"></div></div>`;
  }).join('');
  document.getElementById('pinp').innerHTML=
    [...'123456789'].map(k=>`<button class="pk" onclick="pk('${k}')">${k}</button>`).join('')+
    `<button class="pk" onclick="pk('del')">⌫</button><button class="pk" onclick="pk('0')">0</button><button class="pk" onclick="pk('ok')">✓</button>`;
}

function pickU(uid){
  selUid=uid;pinBuf='';
  document.querySelectorAll('.ucard').forEach(c=>c.classList.remove('sel'));
  document.getElementById('uc-'+uid).classList.add('sel');
  const u=USERS.find(x=>x.id===uid);
  document.getElementById('pinl').textContent=`PIN for ${u.name}`;
  document.getElementById('pine').textContent='';
  document.getElementById('pinw').classList.add('show');
  doDots();
}
function doDots(){
  document.getElementById('pind').innerHTML=
    Array.from({length:4},(_,i)=>`<div class="pdot ${i<pinBuf.length?'on':''}"></div>`).join('');
}
function pk(k){
  if(!selUid)return;
  document.getElementById('pine').textContent='';
  if(k==='del'){pinBuf=pinBuf.slice(0,-1);doDots();return}
  if(k==='ok'){verP();return}
  if(pinBuf.length<4){pinBuf+=k;doDots()}
  if(pinBuf.length===4)setTimeout(verP,150);
}
function verP(){
  const u=USERS.find(x=>x.id===selUid);
  if(pinBuf===u.pin){
    CU=u;document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    const av=document.getElementById('hav');
    av.style.cssText=`background:color-mix(in srgb,${u.col} 15%,transparent);color:${u.col};border:1px solid ${u.col}`;
    av.textContent=u.init;document.getElementById('hnm').textContent=u.name;
    buildSB();goTo('dash');
  }else{pinBuf='';doDots();document.getElementById('pine').textContent='Incorrect PIN. Try again.'}
}
function logout(){
  CU=null;CT=null;TS=null;selUid=null;pinBuf='';clearInterval(tmrInt);
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pinw').classList.remove('show');
  initLogin();
}

// ─── SIDEBAR ───
function buildSB(f=''){
  const p=gP(CU.id),fl=TOPICS.filter(t=>!f||t.name.toLowerCase().includes(f.toLowerCase()));
  document.getElementById('sbsc').innerHTML=
    `<div class="sbsec">Overview</div>
     <div class="ni ${CP==='dash'?'active':''}" onclick="goTo('dash')" style="--col:var(--c1)">
       <span class="nd"></span>Dashboard</div>
     <div class="sbsec">Part 1 Topics</div>`+
    fl.map(t=>{const tp=p[t.id],d=tp&&tp.a>0;
      return`<div class="ni ${CP==='topic'&&CT?.id===t.id?'active':''}${d?' done':''}" onclick="goTo('topic','${t.id}')" style="--col:${t.col}">
        <span class="nd"></span><span style="flex:1;font-size:12px;line-height:1.3">${t.name}</span>
        ${d?`<span class="ns">${tp.b}%</span>`:''}</div>`;
    }).join('')+
    `<div class="sbsec">More</div>
     <div class="ni ${CP==='hist'?'active':''}" onclick="goTo('hist')" style="--col:var(--c4)">
       <span class="nd"></span>Test History</div>`;
}
function fSB(v){buildSB(v)}

// ─── NAV ───
function goTo(pg,tid){
  CP=pg;clearInterval(tmrInt);
  if(pg==='topic'){CT=TOPICS.find(t=>t.id===tid)}
  document.getElementById('hpg').textContent=pg==='dash'?'Dashboard':pg==='topic'?CT.name:pg==='test'?'Mock Test':pg==='results'?'Results':'History';
  buildSB(document.getElementById('sbs').value);
  const m=document.getElementById('main');
  if(pg==='dash')rDash(m);
  else if(pg==='topic')rTopic(m);
  else if(pg==='test')rTest(m);
  else if(pg==='results')rResults(m);
  else if(pg==='hist')rHist(m);
  m.scrollTop=0;
}

// ─── HIGHLIGHT ───
function hl(c){
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
   .replace(/(\/\/[^\n]*)/g,'<span class="cmt">$1</span>')
   .replace(/(#[^\n]*)/g,'<span class="cmt">$1</span>')
   .replace(/\b(public|private|protected|internal|static|abstract|sealed|virtual|override|new|partial|readonly|const|var|dynamic|using|namespace|class|interface|struct|enum|record|async|await|Task|return|if|else|for|foreach|while|try|catch|finally|throw|null|true|false|void|string|int|bool|decimal|double|float|long|char|object|base|this|where|get|set|init)\b/g,'<span class="kw">$1</span>')
   .replace(/("(?:[^"\\]|\\.)*")/g,'<span class="str">$1</span>')
   .replace(/\b(\d+(?:\.\d+)?[mMfFdD]?)\b/g,'<span class="num">$1</span>');
}

// ─── DASHBOARD ───
function rDash(m){
  const p=gP(CU.id);let att=0,bs=0,st=0;
  TOPICS.forEach(t=>{const tp=p[t.id];if(tp){att+=tp.a;bs+=tp.b;st++}});
  const avg=st?Math.round(bs/st):0,tq=TOPICS.reduce((a,t)=>a+t.tests.length,0);
  m.innerHTML=`<div class="dh"><h1>Hello, ${CU.name} 👋</h1>
  <p style="color:var(--t2);font-size:13px;margin-top:4px">Part 1 — ${TOPICS.length} topics · ${tq} mock questions</p></div>
  <div class="sgrid">
    <div class="sbox"><div class="sv" style="color:var(--c1)">${st}/${TOPICS.length}</div><div class="sl">Topics started</div></div>
    <div class="sbox"><div class="sv" style="color:var(--c3)">${att}</div><div class="sl">Tests taken</div></div>
    <div class="sbox"><div class="sv" style="color:${avg>=70?'var(--c1)':avg>=50?'var(--c4)':'var(--danger)'}">${avg}%</div><div class="sl">Avg best score</div></div>
    <div class="sbox"><div class="sv" style="color:var(--c5)">${TOPICS.length-st}</div><div class="sl">Remaining</div></div>
  </div>
  <div class="sec">Topics in Part 1</div>
  <div class="pgrid">${TOPICS.map(t=>{const tp=p[t.id],pct=tp?tp.b:0,at=tp?tp.a:0;
    return`<div class="pt" onclick="goTo('topic','${t.id}')" style="--col:${t.col}">
      <div class="ptt"><span class="ptd"></span><span class="ptn">${t.name}</span><span class="ptc">${t.tests.length}Q</span></div>
      <div class="pbb"><div class="pbf" style="width:${pct}%"></div></div>
      <div class="ppc">${pct>0?pct+'% best · '+at+' test'+(at>1?'s':''):'Not started'}</div>
    </div>`;}).join('')}</div>
  <div class="sec">Navigate to other parts</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <a href="part2.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;text-decoration:none;color:var(--t1);font-size:13px;transition:.15s" onmouseover="this.style.borderColor='var(--c4)'" onmouseout="this.style.borderColor='var(--bd)'">Part 2 → EF Core · SQL · SOLID · Git</a>
    <a href="part3.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;text-decoration:none;color:var(--t1);font-size:13px;transition:.15s" onmouseover="this.style.borderColor='var(--c5)'" onmouseout="this.style.borderColor='var(--bd)'">Part 3 → Testing · Security · JS · Agile</a>
  </div>`;
}

// ─── TOPIC ───
function rTopic(m){
  const t=CT,p=gP(CU.id),tp=p[t.id];
  m.innerHTML=`<div class="tban" style="--col:${t.col}">
    <div class="btop">
      <div><div class="btt">${t.name}</div>
        <div class="bts">${t.concepts.length} concepts · ${t.tests.length} questions${tp?` · Best: ${tp.b}%`:''}</div></div>
      <button class="stbtn" style="background:${t.col}" onclick="startTest()">Mock Test →</button>
    </div>
    <div class="bcs"><span class="chip cc">Core</span><span class="chip cs">Senior</span><span class="chip ca">Advanced</span></div>
  </div>
  <div class="sec">Concepts (${t.concepts.length})</div>
  <div class="clist">${t.concepts.map((c,i)=>`
  <div class="cx">
    <div class="cxh" onclick="tCC(${i})" style="--col:${t.col}">
      <span class="ctag chip ${c.tag==='core'?'cc':c.tag==='senior'?'cs':'ca'}">${c.tag}</span>
      <span class="cnm">${c.name}</span>
      <span class="carr" id="ca${i}">›</span>
    </div>
    <div class="cxb" id="cb${i}">
      <div class="ctx">${c.txt}</div>
      ${c.code?`<pre class="cb">${hl(c.code)}</pre>`:''}
    </div>
  </div>`).join('')}</div>
  <div style="text-align:center;padding:16px 0 40px">
    <button class="stbtn" style="background:${t.col};font-size:15px;padding:14px 32px" onclick="startTest()">
      Start ${t.tests.length}-question Mock Test →</button></div>`;
}
function tCC(i){
  const b=document.getElementById('cb'+i),a=document.getElementById('ca'+i);
  const o=b.classList.toggle('open');a.classList.toggle('open',o);
}

// ─── TEST ───
function startTest(){
  TS={topic:CT,qs:[...CT.tests],cur:0,ans:Array(CT.tests.length).fill(null),
    rev:Array(CT.tests.length).fill(false),t0:Date.now(),tLeft:CT.tests.length*60,done:false};
  goTo('test');startTmr();
}
function startTmr(){
  clearInterval(tmrInt);
  tmrInt=setInterval(()=>{
    if(!TS||TS.done){clearInterval(tmrInt);return}
    TS.tLeft--;
    const el=document.getElementById('ttmr');
    if(el){const mn=Math.floor(TS.tLeft/60),sc=TS.tLeft%60;
      el.textContent=`${mn}:${String(sc).padStart(2,'0')}`;
      el.className='tmr'+(TS.tLeft<60?' danger':TS.tLeft<120?' warn':'');}
    if(TS.tLeft<=0)finTest();
  },1000);
}
function rTest(m){
  if(!TS)return;
  const q=TS.qs[TS.cur],mn=Math.floor(TS.tLeft/60),sc=TS.tLeft%60;
  const qpr=TS.qs.map((_,i)=>{
    let cl='';
    if(i===TS.cur)cl='cur';
    else if(TS.rev[i])cl=TS.ans[i]===TS.qs[i].ans?'ok':'bad';
    else if(TS.ans[i]!==null)cl='ans';
    return`<div class="qp ${cl}" onclick="goQ(${i})">${i+1}</div>`;
  }).join('');
  const opts=q.opts.map((o,i)=>{
    let cl='';
    if(TS.rev[TS.cur]){if(i===q.ans)cl='correct';else if(i===TS.ans[TS.cur]&&i!==q.ans)cl='wrong';}
    else if(i===TS.ans[TS.cur])cl='sel';
    return`<div class="opt ${cl}${TS.rev[TS.cur]?' locked':''}" onclick="selO(${i})">
      <span class="ol">${'ABCD'[i]}</span>${o}</div>`;
  }).join('');
  m.innerHTML=`<div class="tsh">
    <div class="ttop">
      <div class="ti"><h2>${TS.topic.name} — Mock Test</h2>
        <p>Q${TS.cur+1} of ${TS.qs.length} · <span class="qdiff qd${(q.diff||'easy')[0]}">${q.diff||'easy'}</span></p></div>
      <div class="tmr" id="ttmr">${mn}:${String(sc).padStart(2,'0')}</div>
    </div>
    <div class="qpr">${qpr}</div>
    <div class="qcard">
      <div class="qnum">Question ${TS.cur+1}</div>
      <div class="qtx">${q.q}</div>
      ${q.code?`<pre class="qco">${hl(q.code)}</pre>`:''}
      <div class="opts">${opts}</div>
      <div class="expl ${TS.rev[TS.cur]?'show':''}" id="expl">💡 ${q.exp}</div>
    </div>
    <div class="tnav">
      ${TS.cur>0?`<button class="btn" onclick="goQ(${TS.cur-1})">← Prev</button>`:''}
      ${TS.ans[TS.cur]!==null&&!TS.rev[TS.cur]?`<button class="btn btnw" onclick="revO()">Show Answer</button>`:''}
      ${TS.cur<TS.qs.length-1?`<button class="btn btnp" onclick="goQ(${TS.cur+1})">Next →</button>`:
        `<button class="btn btnp" onclick="finTest()">Finish ✓</button>`}
    </div>
  </div>`;
}
function selO(i){if(TS.rev[TS.cur])return;TS.ans[TS.cur]=i;rTest(document.getElementById('main'))}
function revO(){TS.rev[TS.cur]=true;rTest(document.getElementById('main'))}
function goQ(i){TS.cur=i;rTest(document.getElementById('main'))}
function finTest(){
  clearInterval(tmrInt);TS.done=true;
  const ok=TS.ans.filter((a,i)=>a===TS.qs[i].ans).length;
  const score=Math.round(ok/TS.qs.length*100);
  const taken=Math.round((Date.now()-TS.t0)/1000);
  TS.score=score;TS.ok=ok;TS.taken=taken;
  const p=gP(CU.id),ex=p[TS.topic.id];
  p[TS.topic.id]={a:(ex?.a||0)+1,b:Math.max(ex?.b||0,score),l:score};
  sP(CU.id,p);
  aH(CU.id,{t:TS.topic.name,tid:TS.topic.id,s:score,ok,total:TS.qs.length,taken,d:new Date().toLocaleDateString('en-IN')});
  goTo('results');
}

// ─── RESULTS ───
function rResults(m){
  if(!TS)return;
  const{score,ok,taken,qs,ans}=TS;
  const gr=score>=80?'A':score>=60?'B':'C';
  const gm=score>=80?'Interview-ready! 🎯':score>=60?'Good — review weak areas 📖':'Keep practising 💪';
  m.innerHTML=`<div class="rh">
    <div class="rsc" style="color:${score>=80?'var(--c1)':score>=60?'var(--c4)':'var(--danger)'}">${score}%</div>
    <div class="rlb">${TS.topic.name}</div>
    <div class="rgr gr${gr.toLowerCase()}">${gr} · ${gm}</div>
    <div class="rst">
      <div class="rs"><strong>${ok}</strong>Correct</div>
      <div class="rs"><strong>${qs.length-ok}</strong>Wrong</div>
      <div class="rs"><strong>${taken}s</strong>Time</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
    <button class="btn btnp" onclick="startTest()">Retry Test</button>
    <button class="btn" onclick="goTo('topic','${TS.topic.id}')">← Review Concepts</button>
    <button class="btn" onclick="goTo('dash')">Dashboard</button>
  </div>
  <div class="sec">Full Review</div>
  ${qs.map((q,i)=>{const ua=ans[i],isOk=ua===q.ans;
    return`<div class="ri">
      <div class="riq">${i+1}. ${q.q}</div>
      ${ua!==null?`<div class="ria ${isOk?'rok':'rbd'}">${isOk?'✓':'✗'} Your answer: ${q.opts[ua]}</div>`:'<div class="ria" style="color:var(--t3)">— Not answered</div>'}
      ${!isOk?`<div class="ria rok">✓ Correct: ${q.opts[q.ans]}</div>`:''}
      <div class="rex">💡 ${q.exp}</div>
    </div>`;}).join('')}`;
}

// ─── HISTORY ───
function rHist(m){
  const h=gH(CU.id);
  if(!h.length){m.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">📝</div><p>No tests taken yet.</p></div>';return}
  m.innerHTML=`<div class="sec">Test History (${h.length})</div>`+
    h.map(r=>`<div class="hr2">
      <div style="flex:1"><div class="ht">${r.t}</div><div class="hd">${r.d} · ${r.taken}s</div></div>
      <div class="hsc" style="color:${r.s>=80?'var(--c1)':r.s>=60?'var(--c4)':'var(--danger)'}">${r.s}%</div>
      <div style="font-size:12px;color:var(--t3)">${r.ok}/${r.total}</div>
      <button class="btn" style="font-size:11px;padding:5px 12px" onclick="goTo('topic','${r.tid}')">Study</button>
    </div>`).join('');
}

initLogin();
</script>
</body>
</html>
