  {id:'u2',name:'Naveen',role:'Developer',pin:'2345',col:'#FF7EB3',init:'NV'},
  {id:'u3',name:'Priya',role:'Developer',pin:'3456',col:'#7EB8FF',init:'PR'},

];
const TOPICS=[
{id:'testing',name:'Unit Testing & Mocking',col:'#FF7EB3',
concepts:[
{name:'xUnit, Moq & AAA Pattern',tag:'core',
txt:`<strong>AAA Pattern</strong>: Arrange (setup) → Act (execute method) → Assert (verify result).<br>
<strong>[Fact]</strong>: single test. <strong>[Theory] + [InlineData]</strong>: parameterized — runs same test with different inputs.<br>
<strong>Mock.Setup().Returns()</strong>: configure mock to return specific value.<br>
<strong>Mock.Verify()</strong>: assert method was called (Times.Once, Times.Never, Times.Exactly(n)).<br>
<strong>It.IsAny&lt;T&gt;()</strong>: matches any argument of type T. <strong>Test naming</strong>: MethodName_Scenario_ExpectedResult.`,
code:`public class OrderServiceTests {
    private readonly Mock&lt;IOrderRepository&gt; _repo = new();
    private readonly Mock&lt;IEmailService&gt; _email = new();
    private readonly OrderService _sut;

    public OrderServiceTests() =&gt;
        _sut = new OrderService(_repo.Object, _email.Object);

    [Fact]
    public async Task CreateOrder_ValidInput_ReturnsCreatedOrder() {
        // Arrange
        var dto = new CreateOrderDto { CustomerId=1, Amount=100m };
        _repo.Setup(r =&gt; r.AddAsync(It.IsAny&lt;Order&gt;())).ReturnsAsync(42);

        // Act
        var result = await _sut.CreateAsync(dto);

{id:'security',name:'Security & OWASP',col:'#7EFFA0',
concepts:[
{name:'OWASP Top 10 & .NET Security Vulnerabilities',tag:'senior',
txt:`<ul class="bl">
<li><strong>SQL Injection</strong>: parameterized queries / EF Core. NEVER string concatenation in SQL</li>
<li><strong>XSS</strong>: encode output (@Html.Encode), Content-Security-Policy header</li>
<li><strong>CSRF</strong>: [ValidateAntiForgeryToken] on POST. HttpOnly cookies</li>
<li><strong>Path Traversal (CWE-22)</strong>: Path.GetFileName() strips ../. Use Guid as filename</li>
<li><strong>Broken Auth</strong>: JWT with short expiry + refresh tokens. HTTPS only</li>
<li><strong>Sensitive Data</strong>: never log passwords/cards/PII. Encrypt at rest + in transit</li>
<li><strong>Mass Assignment</strong>: use DTOs — never bind entity directly from [FromBody]</li>
<li><strong>Integer Overflow</strong>: validate ranges + use checked{} (your Humana DAST experience!)</li>
</ul>
<strong>SAST (Static)</strong>: SonarQube, Checkmarx — analyzes code without running. Finds code-level bugs.<br>
<strong>DAST (Dynamic)</strong>: runs against live app — finds runtime vulnerabilities like your Humana work.`,
code:`// ✅ Path Traversal fix (CWE-22) — your Checkmarx/Humana fix!
public async Task&lt;IActionResult&gt; Upload(IFormFile file) {
    var allowed = new[] { ".pdf", ".docx", ".xlsx" };
    var ext = Path.GetExtension(file.FileName).ToLower();
    if (!allowed.Contains(ext)) return BadRequest("Not allowed");
    if (file.Length &gt; 10 * 1024 * 1024) return BadRequest("Too large");
    // NEVER use file.FileName as storage path
    string safe = $"{Guid.NewGuid()}{ext}";  // ✅ Guid strips traversal
    string path = Path.Combine(_uploadDir, safe);
    await file.CopyToAsync(System.IO.File.Create(path));
    return Ok(new { filename = safe });
}

// ✅ Mass Assignment — use DTO, not entity
// ❌ public IActionResult Update([FromBody] User user) // exposes IsAdmin!
public record UpdateUserDto(string Name, string Email); // safe fields only ✅

// ✅ Integer overflow prevention (your DAST SubmitAuthUpdate fix)
if (dto.RetryCount is &lt; 0 or &gt; 10) return BadRequest("Out of range");
checked { int r = dto.Amount + dto.Surcharge; } // throws OverflowException ✅

// ✅ Never log sensitive data
_log.LogInformation("User {UserId} logged in", userId); // ok
// ❌ _log.LogDebug("Password: {Password}", password);  // NEVER`},
{name:'HTTPS, CORS & Security Headers',tag:'core',
txt:`<strong>HTTPS</strong>: always redirect HTTP → HTTPS in production. UseHttpsRedirection().<br>
<strong>CORS</strong>: restrict which origins can call your API. NEVER AllowAnyOrigin() in production!<br>
<strong>Security headers</strong>: X-Content-Type-Options, X-Frame-Options, Content-Security-Policy reduce attack surface.<br>
<strong>HttpOnly cookie</strong>: JavaScript cannot read it — prevents XSS from stealing session/JWT.`,
code:`// CORS — specific origins only ✅
builder.Services.AddCors(o =&gt; o.AddPolicy("Portal", p =&gt;
    p.WithOrigins("https://portal.myapp.com")
     .WithMethods("GET", "POST", "PUT", "DELETE")
     .WithHeaders("Authorization", "Content-Type")));

// ❌ NEVER in production
// p.AllowAnyOrigin() — allows ANY website to call your API

// Security headers middleware
app.Use(async (ctx, next) =&gt; {
    ctx.Response.Headers.Add("X-Content-Type-Options", "nosniff");
    ctx.Response.Headers.Add("X-Frame-Options", "DENY");
    ctx.Response.Headers.Add("X-XSS-Protection", "1; mode=block");
    await next();
});

// HttpOnly + Secure cookies
var opts = new CookieOptions { HttpOnly=true, Secure=true, SameSite=SameSiteMode.Strict };
Response.Cookies.Append("session", token, opts);`}
],

{q:'Mass Assignment prevention:',opts:['Use [Authorize]','Use DTOs — expose only safe fields','Use HTTPS','Validate JWT'],ans:1,diff:'medium',exp:'Mass Assignment: binding an entity directly from [FromBody] lets attackers set sensitive fields like IsAdmin=true. Always use DTOs with only the fields users should be allowed to modify.'},

concepts:[
{name:'var, let, const, Scope, Hoisting & Closures',tag:'core',
txt:`<strong>var</strong>: function-scoped, hoisted AND initialized to undefined.<br>
<strong>let/const</strong>: block-scoped, hoisted but NOT initialized (Temporal Dead Zone — TDZ). ReferenceError if accessed before declaration.<br>
<strong>const</strong>: cannot be reassigned. Object properties CAN still be mutated.<br>
<strong>Closure</strong>: inner function retains access to outer scope variables even after outer function returns.`,
code:`// var hoisting
console.log(x); // undefined (not error!) — var hoisted + initialized
var x = 5;
// console.log(y); // ReferenceError! — TDZ
let y = 10;

// Classic loop bug
for (var i=0; i&lt;3; i++) {
    setTimeout(() =&gt; console.log(i), 100); // 3,3,3 ❌ var shared
}
for (let i=0; i&lt;3; i++) {
    setTimeout(() =&gt; console.log(i), 100); // 0,1,2 ✅ let block-scoped
}

// Closure
function counter() {
    let n = 0;  // captured in closure
    return {
        inc: () =&gt; ++n,
        val: () =&gt; n
    };
}
const c = counter();
c.inc(); c.inc();
console.log(c.val()); // 2 — n persists in closure`},
{name:'Promises, async/await, ES6+ & jQuery AJAX',tag:'core',
txt:`<strong>Promise states</strong>: pending → fulfilled (resolved) / rejected. Transition is permanent.<br>
<strong>async/await</strong>: syntactic sugar over Promises. try/catch works naturally.<br>
<strong>ES6+ key features</strong>: arrow functions, destructuring, spread, template literals, optional chaining <code>?.</code>, nullish coalescing <code>??</code>.<br>
<strong>jQuery AJAX</strong>: still common in legacy ASP.NET MVC. RequireVerificationToken needed for POST.`,
code:`// async/await — preferred over .then chains
async function loadOrders() {
    try {
        const res = await fetch('/api/orders');
        if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
        const data = await res.json();
        renderOrders(data);
    } catch (err) { showError(err.message); }
    finally { hideSpinner(); }
}

// ES6+ features
const { name, email, role = 'user' } = userData;    // destructuring + default
const merged = { ...defaults, ...overrides };         // spread
const city = user?.address?.city ?? 'Unknown';        // optional chain + null coalesce

// jQuery AJAX (ASP.NET MVC legacy)
$.ajax({
    url: '/Orders/Create', method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ customerId: 1, amount: 100 }),
    headers: { 'RequestVerificationToken':
        $('[name=__RequestVerificationToken]').val() }, // anti-CSRF
    success: d => console.log('Created:', d),
    error: xhr => console.error(xhr.statusText)
});

// DOM — event delegation
document.querySelector('#list').addEventListener('click', e => {
    const item = e.target.closest('[data-id]');
    if (item) loadDetail(item.dataset.id);
});`}

txt:`<strong>Semantic tags</strong>: &lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;section&gt;, &lt;article&gt;, &lt;aside&gt;, &lt;footer&gt; — meaning for SEO + accessibility.<br>

{name:'Flexbox, Grid & Responsive Design',tag:'core',
txt:`<strong>Flexbox</strong>: 1D layout (row OR column). <code>justify-content</code> = main axis. <code>align-items</code> = cross axis.<br>
<strong>Grid</strong>: 2D layout (rows AND columns). More powerful for page layouts.<br>
<strong>Media query</strong>: responsive breakpoints. Mobile-first: base styles for mobile, add breakpoints for larger screens.<br>
<strong>CSS variables</strong>: <code>--primary: #7EFFA0;</code> then <code>background: var(--primary);</code>`,
code:`/* Flexbox */
.container {
    display: flex;
    justify-content: space-between; /* main axis alignment */
    align-items: center;            /* cross axis alignment */
    flex-wrap: wrap; gap: 16px;
}
.item { flex: 1 1 200px; } /* grow, shrink, basis */

/* Grid — auto-responsive columns */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
}

/* CSS variables */
:root { --primary: #7EFFA0; --bg: #080810; }
.btn { background: var(--primary); color: #000; }

/* Media query — mobile first */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .container { flex-direction: column; }
}`}

const gP=u=>sg(u,'p',{});const sP=(u,p)=>ss(u,'p',p);
const gH=u=>sg(u,'h',[]);const aH=(u,r)=>{const h=gH(u);h.unshift(r);if(h.length>50)h.pop();ss(u,'h',h)};
function initLogin(){document.getElementById('urow').innerHTML=USERS.map(u=>{const p=gP(u.id),done=Object.values(p).filter(x=>x.a>0).length,pct=Math.round(done/TOPICS.length*100);return`<div class="ucard" id="uc-${u.id}" onclick="pickU('${u.id}')" style="--col:${u.col}"><div class="uav">${u.init}</div><div class="unm">${u.name}</div><div class="url">${u.role}</div><div class="upb" style="width:${pct}%"></div></div>`;}).join('');document.getElementById('pinp').innerHTML=[...'123456789'].map(k=>`<button class="pk" onclick="pk('${k}')">${k}</button>`).join('')+`<button class="pk" onclick="pk('del')">⌫</button><button class="pk" onclick="pk('0')">0</button><button class="pk" onclick="pk('ok')">✓</button>`;}
function pickU(uid){selUid=uid;pinBuf='';document.querySelectorAll('.ucard').forEach(c=>c.classList.remove('sel'));document.getElementById('uc-'+uid).classList.add('sel');const u=USERS.find(x=>x.id===uid);document.getElementById('pinl').textContent=`PIN for ${u.name}`;document.getElementById('pine').textContent='';document.getElementById('pinw').classList.add('show');doDots();}
function doDots(){document.getElementById('pind').innerHTML=Array.from({length:4},(_,i)=>`<div class="pdot ${i<pinBuf.length?'on':''}"></div>`).join('');}
function pk(k){if(!selUid)return;document.getElementById('pine').textContent='';if(k==='del'){pinBuf=pinBuf.slice(0,-1);doDots();return}if(k==='ok'){verP();return}if(pinBuf.length<4){pinBuf+=k;doDots()}if(pinBuf.length===4)setTimeout(verP,150);}
function verP(){const u=USERS.find(x=>x.id===selUid);if(pinBuf===u.pin){CU=u;document.getElementById('login').style.display='none';document.getElementById('app').style.display='flex';const av=document.getElementById('hav');av.style.cssText=`background:color-mix(in srgb,${u.col} 15%,transparent);color:${u.col};border:1px solid ${u.col}`;av.textContent=u.init;document.getElementById('hnm').textContent=u.name;buildSB();goTo('dash');}else{pinBuf='';doDots();document.getElementById('pine').textContent='Incorrect PIN. Try again.';}}
function logout(){CU=null;CT=null;TS=null;selUid=null;pinBuf='';clearInterval(tmrInt);document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('pinw').classList.remove('show');initLogin();}
function buildSB(f=''){const p=gP(CU.id),fl=TOPICS.filter(t=>!f||t.name.toLowerCase().includes(f.toLowerCase()));document.getElementById('sbsc').innerHTML=`<div class="sbsec">Overview</div><div class="ni ${CP==='dash'?'active':''}" onclick="goTo('dash')" style="--col:var(--c5)"><span class="nd"></span>Dashboard</div><div class="sbsec">Part 3 Topics</div>`+fl.map(t=>{const tp=p[t.id],d=tp&&tp.a>0;return`<div class="ni ${CP==='topic'&&CT?.id===t.id?'active':''}${d?' done':''}" onclick="goTo('topic','${t.id}')" style="--col:${t.col}"><span class="nd"></span><span style="flex:1;font-size:12px;line-height:1.3">${t.name}</span>${d?`<span class="ns">${tp.b}%</span>`:''}</div>`;}).join('')+`<div class="sbsec">More</div><div class="ni ${CP==='hist'?'active':''}" onclick="goTo('hist')" style="--col:var(--c4)"><span class="nd"></span>Test History</div>`;}
function fSB(v){buildSB(v)}
function goTo(pg,tid){CP=pg;clearInterval(tmrInt);if(pg==='topic'){CT=TOPICS.find(t=>t.id===tid)}document.getElementById('hpg').textContent=pg==='dash'?'Dashboard':pg==='topic'?CT.name:pg==='test'?'Mock Test':pg==='results'?'Results':'History';buildSB(document.getElementById('sbs').value);const m=document.getElementById('main');if(pg==='dash')rDash(m);else if(pg==='topic')rTopic(m);else if(pg==='test')rTest(m);else if(pg==='results')rResults(m);else if(pg==='hist')rHist(m);m.scrollTop=0;}
function hl(c){
  var s=c;
  s=s.replace(/([\/][\/][^\n]*)/g,'<span class="cmt">$1</span>');
  s=s.replace(/(&quot;(?:(?!&quot;).)*&quot;)/g,'<span class="str">$1</span>');
  var kw=['public','private','protected','internal','static','abstract','sealed','virtual','override','new','partial','readonly','const','var','dynamic','using','namespace','class','interface','struct','enum','record','async','await','Task','return','if','else','for','foreach','while','try','catch','finally','throw','null','true','false','void','string','int','bool','decimal','double','float','long','char','object','base','this','where','get','set','init'];
  kw.forEach(k=>{s=s.replace(new RegExp('\\b'+k+'\\b','g'),'<span class="kw">'+k+'</span>');});
  s=s.replace(/\b([0-9]+(?:\.[0-9]+)?[mMfFdDlL]?)\b/g,'<span class="num">$1</span>');
  return s;
}
function rDash(m){const p=gP(CU.id);let att=0,bs=0,st=0;TOPICS.forEach(t=>{const tp=p[t.id];if(tp){att+=tp.a;bs+=tp.b;st++}});const avg=st?Math.round(bs/st):0,tq=TOPICS.reduce((a,t)=>a+t.tests.length,0);m.innerHTML=`<div class="dh"><h1>Hello, ${CU.name} 👋</h1><p style="color:var(--t2);font-size:13px;margin-top:4px">Part 3 (Final) — ${TOPICS.length} topics · ${tq} mock questions</p></div><div class="sgrid"><div class="sbox"><div class="sv" style="color:var(--c5)">${st}/${TOPICS.length}</div><div class="sl">Topics started</div></div><div class="sbox"><div class="sv" style="color:var(--c3)">${att}</div><div class="sl">Tests taken</div></div><div class="sbox"><div class="sv" style="color:${avg>=70?'var(--c1)':avg>=50?'var(--c4)':'var(--danger)'}">${avg}%</div><div class="sl">Avg best score</div></div><div class="sbox"><div class="sv" style="color:var(--c4)">${TOPICS.length-st}</div><div class="sl">Remaining</div></div></div><div class="sec">Topics in Part 3</div><div class="pgrid">${TOPICS.map(t=>{const tp=p[t.id],pct=tp?tp.b:0,at=tp?tp.a:0;return`<div class="pt" onclick="goTo('topic','${t.id}')" style="--col:${t.col}"><div class="ptt"><span class="ptd"></span><span class="ptn">${t.name}</span><span class="ptc">${t.tests.length}Q</span></div><div class="pbb"><div class="pbf" style="width:${pct}%"></div></div><div class="ppc">${pct>0?pct+'% best · '+at+' test'+(at>1?'s':''):'Not started'}</div></div>`;}).join('')}</div><div class="sec">Navigate to other parts</div><div style="display:flex;gap:10px;flex-wrap:wrap"><a href="part1.html" style="display:inline-flex;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;text-decoration:none;color:var(--t1);font-size:13px">← Part 1 · C# · Collections · MVC</a><a href="part2.html" style="display:inline-flex;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;text-decoration:none;color:var(--t1);font-size:13px">← Part 2 · EF · SQL · SOLID · Git</a></div><div style="background:var(--s1);border:1px solid rgba(126,255,160,.2);border-radius:12px;padding:16px;margin-top:20px"><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--c1);margin-bottom:8px">🎯 Interview Day Checklist</div><div style="font-size:13px;color:var(--t2);line-height:1.8">✓ C# OOP, collections, LINQ (Part 1)<br>✓ EF Core, SQL joins + window functions (Part 2)<br>✓ SOLID principles, design patterns (Part 2)<br>✓ Unit testing with xUnit + Moq (Part 3)<br>✓ Security: CWE-22, DAST, Checkmarx experience (Part 3)<br>✓ 4 STAR stories ready (Hackathon · AI prototype · NBFC go-lives · Vault fix)<br>✓ Question to ask: "What does success look like in 90 days?"</div></div>`;}
function rTopic(m){const t=CT,p=gP(CU.id),tp=p[t.id];m.innerHTML=`<div class="tban" style="--col:${t.col}"><div class="btop"><div><div class="btt">${t.name}</div><div class="bts">${t.concepts.length} concepts · ${t.tests.length} questions${tp?` · Best: ${tp.b}%`:''}</div></div><button class="stbtn" style="background:${t.col}" onclick="startTest()">Mock Test →</button></div><div class="bcs"><span class="chip cc">Core</span><span class="chip cs">Senior</span><span class="chip ca">Advanced</span></div></div><div class="sec">Concepts (${t.concepts.length})</div><div class="clist">${t.concepts.map((c,i)=>`<div class="cx"><div class="cxh" onclick="tCC(${i})" style="--col:${t.col}"><span class="ctag chip ${c.tag==='core'?'cc':c.tag==='senior'?'cs':'ca'}">${c.tag}</span><span class="cnm">${c.name}</span><span class="carr" id="ca${i}">›</span></div><div class="cxb" id="cb${i}"><div class="ctx">${c.txt}</div>${c.code?`<pre class="cb">${hl(c.code)}</pre>`:''}</div></div>`).join('')}</div><div style="text-align:center;padding:16px 0 40px"><button class="stbtn" style="background:${t.col};font-size:15px;padding:14px 32px" onclick="startTest()">Start ${t.tests.length}-question Mock Test →</button></div>`;}
function tCC(i){const b=document.getElementById('cb'+i),a=document.getElementById('ca'+i);const o=b.classList.toggle('open');a.classList.toggle('open',o);}
function startTest(){TS={topic:CT,qs:[...CT.tests],cur:0,ans:Array(CT.tests.length).fill(null),rev:Array(CT.tests.length).fill(false),t0:Date.now(),tLeft:CT.tests.length*60,done:false};goTo('test');startTmr();}
function startTmr(){clearInterval(tmrInt);tmrInt=setInterval(()=>{if(!TS||TS.done){clearInterval(tmrInt);return}TS.tLeft--;const el=document.getElementById('ttmr');if(el){const mn=Math.floor(TS.tLeft/60),sc=TS.tLeft%60;el.textContent=`${mn}:${String(sc).padStart(2,'0')}`;el.className='tmr'+(TS.tLeft<60?' danger':TS.tLeft<120?' warn':'');}if(TS.tLeft<=0)finTest();},1000);}
function rTest(m){if(!TS)return;const q=TS.qs[TS.cur],mn=Math.floor(TS.tLeft/60),sc=TS.tLeft%60;const qpr=TS.qs.map((_,i)=>{let cl='';if(i===TS.cur)cl='cur';else if(TS.rev[i])cl=TS.ans[i]===TS.qs[i].ans?'ok':'bad';else if(TS.ans[i]!==null)cl='ans';return`<div class="qp ${cl}" onclick="goQ(${i})">${i+1}</div>`;}).join('');const opts=q.opts.map((o,i)=>{let cl='';if(TS.rev[TS.cur]){if(i===q.ans)cl='correct';else if(i===TS.ans[TS.cur]&&i!==q.ans)cl='wrong';}else if(i===TS.ans[TS.cur])cl='sel';return`<div class="opt ${cl}${TS.rev[TS.cur]?' locked':''}" onclick="selO(${i})"><span class="ol">${'ABCD'[i]}</span>${o}</div>`;}).join('');m.innerHTML=`<div class="tsh"><div class="ttop"><div class="ti"><h2>${TS.topic.name} — Mock Test</h2><p>Q${TS.cur+1} of ${TS.qs.length} · <span class="qdiff qd${(q.diff||'easy')[0]}">${q.diff||'easy'}</span></p></div><div class="tmr" id="ttmr">${mn}:${String(sc).padStart(2,'0')}</div></div><div class="qpr">${qpr}</div><div class="qcard"><div class="qnum">Question ${TS.cur+1}</div><div class="qtx">${q.q}</div>${q.code?`<pre class="qco">${hl(q.code)}</pre>`:''}<div class="opts">${opts}</div><div class="expl ${TS.rev[TS.cur]?'show':''}" id="expl">💡 ${q.exp}</div></div><div class="tnav">${TS.cur>0?`<button class="btn" onclick="goQ(${TS.cur-1})">← Prev</button>`:''}${TS.ans[TS.cur]!==null&&!TS.rev[TS.cur]?`<button class="btn btnw" onclick="revO()">Show Answer</button>`:''}${TS.cur<TS.qs.length-1?`<button class="btn btnp" onclick="goQ(${TS.cur+1})">Next →</button>`:`<button class="btn btnp" onclick="finTest()">Finish ✓</button>`}</div></div>`;}
function selO(i){if(TS.rev[TS.cur])return;TS.ans[TS.cur]=i;rTest(document.getElementById('main'))}
function revO(){TS.rev[TS.cur]=true;rTest(document.getElementById('main'))}
function goQ(i){TS.cur=i;rTest(document.getElementById('main'))}
function finTest(){clearInterval(tmrInt);TS.done=true;const ok=TS.ans.filter((a,i)=>a===TS.qs[i].ans).length;const score=Math.round(ok/TS.qs.length*100);const taken=Math.round((Date.now()-TS.t0)/1000);TS.score=score;TS.ok=ok;TS.taken=taken;const p=gP(CU.id),ex=p[TS.topic.id];p[TS.topic.id]={a:(ex?.a||0)+1,b:Math.max(ex?.b||0,score),l:score};sP(CU.id,p);aH(CU.id,{t:TS.topic.name,tid:TS.topic.id,s:score,ok,total:TS.qs.length,taken,d:new Date().toLocaleDateString('en-IN')});goTo('results');}
function rResults(m){if(!TS)return;const{score,ok,taken,qs,ans}=TS;const gr=score>=80?'A':score>=60?'B':'C';const gm=score>=80?'Interview-ready! 🎯':score>=60?'Good — review weak areas 📖':'Keep practising 💪';m.innerHTML=`<div class="rh"><div class="rsc" style="color:${score>=80?'var(--c1)':score>=60?'var(--c4)':'var(--danger)'}">${score}%</div><div class="rlb">${TS.topic.name}</div><div class="rgr gr${gr.toLowerCase()}">${gr} · ${gm}</div><div class="rst"><div class="rs"><strong>${ok}</strong>Correct</div><div class="rs"><strong>${qs.length-ok}</strong>Wrong</div><div class="rs"><strong>${taken}s</strong>Time</div></div></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px"><button class="btn btnp" onclick="startTest()">Retry Test</button><button class="btn" onclick="goTo('topic','${TS.topic.id}')">← Review Concepts</button><button class="btn" onclick="goTo('dash')">Dashboard</button></div><div class="sec">Full Review</div>${qs.map((q,i)=>{const ua=ans[i],isOk=ua===q.ans;return`<div class="ri"><div class="riq">${i+1}. ${q.q}</div>${ua!==null?`<div class="ria ${isOk?'rok':'rbd'}">${isOk?'✓':'✗'} Your answer: ${q.opts[ua]}</div>`:'<div class="ria" style="color:var(--t3)">— Not answered</div>'}${!isOk?`<div class="ria rok">✓ Correct: ${q.opts[q.ans]}</div>`:''}
<div class="rex">💡 ${q.exp}</div></div>`;}).join('')}`;}
function rHist(m){const h=gH(CU.id);if(!h.length){m.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">📝</div><p>No tests taken yet.</p></div>';return}m.innerHTML=`<div class="sec">Test History (${h.length})</div>`+h.map(r=>`<div class="hr2"><div style="flex:1"><div class="ht">${r.t}</div><div class="hd">${r.d} · ${r.taken}s</div></div><div class="hsc" style="color:${r.s>=80?'var(--c1)':r.s>=60?'var(--c4)':'var(--danger)'}">${r.s}%</div><div style="font-size:12px;color:var(--t3)">${r.ok}/${r.total}</div><button class="btn" style="font-size:11px;padding:5px 12px" onclick="goTo('topic','${r.tid}')">Study</button></div>`).join('');}
initLogin();
</script>
</body>
</html>
